version: 2

models:
  - name: stg_dvf
    description: |
      Une ligne par mutation immobilière (vente Appartement/Maison) en Bretagne.

      **Grain :** 1 ligne par id_mutation (une vente peut couvrir plusieurs lots dans le bronze).

      **Règles métier :**
      - Filtré sur `nature_mutation = 'Vente'` uniquement (hors donations, échanges, etc.)
      - Restreint aux biens résidentiels : `type_local IN ('Appartement', 'Maison')`
      - Agrégation multi-lots : plusieurs lignes bronze (un lot = une ligne) sont consolidées
        en une seule mutation via `sum(surface_reelle_bati)`
      - Outliers exclus : `prix_m2 BETWEEN 100 AND 50000 €/m²`
      - Surface et valeur foncière nulles ou négatives exclues

      **Calcul prix_m2 :** `valeur_fonciere / sum(surface_reelle_bati)` par mutation
      (pas une division par ligne bronze individuelle).

      **Source :** `bronze.raw_dvf` (données DVF brutes téléchargées depuis data.gouv.fr)
    columns:
      - name: id_mutation
        description: |
          Identifiant unique de la vente (clé naturelle DVF).
          Format : chaîne alphanumérique assignée par la DGFiP.
          Garantit l'unicité après agrégation multi-lots.
        tests:
          - not_null
          - unique

      - name: date_mutation
        description: Date de signature de l'acte notarié (format DATE).

      - name: annee
        description: |
          Année extraite de date_mutation via `toYear()`.
          Utilisée comme dimension temporelle dans tous les modèles gold.
        tests:
          - not_null

      - name: code_commune
        description: |
          Code INSEE de la commune (5 caractères, ex 35238 pour Rennes).
          Clé de jointure vers stg_communes.
        tests:
          - not_null

      - name: nom_commune
        description: Libellé de la commune tel que fourni dans les données DVF.

      - name: code_departement
        description: |
          Code du département breton (22, 29, 35, 56).
          Extrait directement des données DVF.

      - name: code_postal
        description: |
          Code postal de la mutation (5 chiffres).
          Utilisé par mart_prix_code_postal comme dimension de drill-down.
          Peut être vide pour certaines mutations historiques.

      - name: type_local
        description: |
          Type de bien immobilier résidentiel.
          Valeurs possibles : 'Appartement', 'Maison' (filtre Silver).
        tests:
          - not_null
          - accepted_values:
              values: ["Appartement", "Maison"]

      - name: surface_reelle_bati
        description: |
          Surface habitable totale en m² pour la mutation complète.
          Correspond à la somme des surfaces de tous les lots de la mutation
          (agrégation du bronze).

      - name: valeur_fonciere
        description: |
          Prix de vente total en euros (valeur foncière DVF).
          Représente le montant réel de la transaction.

      - name: prix_m2
        description: |
          Prix au m² en euros, arrondi à 2 décimales.
          Formule : `round(valeur_fonciere / surface_reelle_bati, 2)`.
          NULL impossible (outliers filtrés à 100-50000 €/m²).
        tests:
          - not_null

  - name: stg_communes
    description: |
      Référentiel des communes bretonnes avec coordonnées GPS du centroïde.

      **Grain :** 1 ligne par code_commune unique.

      **Règles métier :**
      - Restreint aux communes ayant au moins une transaction dans stg_dvf
        (sous-ensemble actif de raw_communes)
      - Dédoublonnage via `any()` au cas où raw_communes contiendrait des doublons
        sur code_commune

      **Source :** `bronze.raw_communes` (référentiel IGN/INSEE des communes)
    columns:
      - name: code_commune
        description: |
          Code INSEE de la commune (5 caractères).
          Clé primaire du référentiel, clé étrangère dans stg_dvf et mart_prix_commune.
        tests:
          - not_null
          - unique

      - name: nom_commune
        description: Libellé officiel de la commune (source IGN/INSEE).

      - name: code_dept
        description: Code du département (22, 29, 35 ou 56 pour la Bretagne).

      - name: longitude
        description: |
          Longitude WGS84 du centroïde géographique de la commune.
          Utilisée pour l'affichage cartographique dans mart_prix_commune.
        tests:
          - not_null

      - name: latitude
        description: |
          Latitude WGS84 du centroïde géographique de la commune.
          Utilisée pour l'affichage cartographique dans mart_prix_commune.
        tests:
          - not_null
