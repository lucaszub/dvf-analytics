version: 2

models:
  - name: stg_dvf
    description: |
      Une ligne par mutation immobilière (vente Appartement/Maison) en Bretagne.
      Source : bronze.raw_dvf_geo (DVF géolocalisées avec id_parcelle, longitude, latitude).
      Grain : 1 ligne par id_mutation (agrégation des lots du bronze).
    columns:
      - name: id_mutation
        description: Identifiant unique de la vente (clé naturelle DVF).
        tests:
          - not_null
          - unique

      - name: date_mutation
        description: Date de signature de l'acte notarié.

      - name: annee
        description: Année extraite via toYear(date_mutation).
        tests:
          - not_null

      - name: code_commune
        description: Code INSEE de la commune (5 caractères).
        tests:
          - not_null

      - name: nom_commune
        description: Libellé de la commune.

      - name: code_departement
        description: Code du département breton (22, 29, 35, 56).

      - name: code_postal
        description: Code postal de la mutation.

      - name: adresse_nom_voie
        description: Nom de la voie de la transaction.

      - name: type_local
        description: Type de bien résidentiel.
        tests:
          - not_null
          - accepted_values:
              values: ["Appartement", "Maison"]

      - name: surface_reelle_bati
        description: Surface habitable totale en m² (somme des lots).

      - name: nombre_pieces_principales
        description: Nombre de pièces principales.

      - name: valeur_fonciere
        description: Prix de vente total en euros.

      - name: prix_m2
        description: Prix au m² arrondi à 2 décimales. Outliers <= 100 000 €/m² filtrés.
        tests:
          - not_null

      - name: id_parcelle
        description: Identifiant parcelle 14 chars — clé de jointure vers stg_parcelles/stg_sections.
        tests:
          - not_null

      - name: longitude
        description: Longitude WGS84 de la transaction.

      - name: latitude
        description: Latitude WGS84 de la transaction.

  - name: stg_communes
    description: |
      Référentiel des communes bretonnes avec coordonnées GPS du centroïde.
      Grain : 1 ligne par code_commune unique.
    columns:
      - name: code_commune
        description: Code INSEE de la commune (5 caractères).
        tests:
          - not_null
          - unique

      - name: nom_commune
        description: Libellé officiel de la commune.

      - name: code_dept
        description: Code du département (22, 29, 35, 56).

      - name: longitude
        description: Longitude WGS84 du centroïde.
        tests:
          - not_null

      - name: latitude
        description: Latitude WGS84 du centroïde.
        tests:
          - not_null

  - name: stg_sections
    description: |
      Sections cadastrales Bretagne dédoublonnées.
      Grain : 1 ligne par section (id 10 chars = code_commune_5 + prefixe_3 + section_2).
      geometry = GeoJSON MultiPolygon sérialisé en String.
    columns:
      - name: id
        description: Identifiant section 10 chars.
        tests:
          - not_null
          - unique

      - name: commune
        description: Code INSEE commune 5 chars.
        tests:
          - not_null

      - name: section
        description: Lettre(s) de la section cadastrale.

      - name: contenance
        description: Superficie de la section en m².

      - name: geometry
        description: Géométrie GeoJSON MultiPolygon sérialisée en String.
        tests:
          - not_null

  - name: stg_parcelles
    description: |
      Parcelles cadastrales Bretagne dédoublonnées.
      Grain : 1 ligne par parcelle (id 14 chars = correspond à id_parcelle dans stg_dvf).
      geometry = GeoJSON Polygon sérialisé en String.
    columns:
      - name: id
        description: Identifiant parcelle 14 chars.
        tests:
          - not_null
          - unique

      - name: commune
        description: Code INSEE commune 5 chars.
        tests:
          - not_null

      - name: section
        description: Lettre(s) de la section.

      - name: numero
        description: Numéro de la parcelle (4 chars).

      - name: contenance
        description: Superficie de la parcelle en m².

      - name: geometry
        description: Géométrie GeoJSON Polygon sérialisée en String.
        tests:
          - not_null
