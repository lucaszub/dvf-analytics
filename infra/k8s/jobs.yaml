      containers:
        - name: dbt
          image: acrdvflucaszub.azurecr.io/dbt:latest
          env:
            - name: CLICKHOUSE_HOST
              value: "clickhouse"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
