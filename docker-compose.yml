services:

  clickhouse:
    image: clickhouse/clickhouse-server:24
    network_mode: host   # bypass iptables NAT issues on VPS
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  clickhouse-data:
