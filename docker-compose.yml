services:

  clickhouse:
    image: clickhouse/clickhouse-server:24
    ports:
      - "8124:8123"
      - "9002:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./clickhouse/users.d:/etc/clickhouse-server/users.d
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  ingest:
    build: ./ingestion
    environment:
      CLICKHOUSE_HOST: clickhouse
    depends_on:
      clickhouse:
        condition: service_healthy

  dbt:
    build: ./transform
    environment:
      CLICKHOUSE_HOST: clickhouse
    depends_on:
      ingest:
        condition: service_completed_successfully

  dbt-docs:
    build: ./transform
    command: >
      sh -c "dbt docs generate --profiles-dir . --project-dir . --no-use-colors &&
             dbt docs serve --profiles-dir . --project-dir . --host 0.0.0.0 --port 8080"
    ports:
      - "8080:8080"
    environment:
      CLICKHOUSE_HOST: clickhouse
    depends_on:
      clickhouse:
        condition: service_healthy

  metabase:
    image: metabase/metabase:latest
    ports:
      - "3001:3000"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: always

volumes:
  clickhouse-data:
