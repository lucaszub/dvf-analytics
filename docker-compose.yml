services:

  clickhouse:
    image: clickhouse/clickhouse-server:24
    ports:
      - "8124:8123"
      - "9002:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./clickhouse/users.d:/etc/clickhouse-server/users.d
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  ingest:
    build: ./ingestion
    environment:
      CLICKHOUSE_HOST: clickhouse
    depends_on:
      clickhouse:
        condition: service_healthy

  dbt:
    build: ./transform
    environment:
      CLICKHOUSE_HOST: clickhouse
    depends_on:
      ingest:
        condition: service_completed_successfully

  api:
    build: ./api
    ports:
      - "8000:8000"
    depends_on:
      dbt:
        condition: service_completed_successfully
    environment:
      CLICKHOUSE_HOST: clickhouse

  dbt-docs:
    build: ./transform
    command: >
      sh -c "dbt docs generate --profiles-dir . --project-dir . --no-use-colors &&
             dbt docs serve --profiles-dir . --project-dir . --host 0.0.0.0 --port 8080"
    ports:
      - "8080:8080"
    environment:
      CLICKHOUSE_HOST: clickhouse
    depends_on:
      clickhouse:
        condition: service_healthy
  
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    environment:
      VITE_API_URL: http://api:8000
      VITE_API_TARGET: http://api:8000
    depends_on:
      api:
        condition: service_started
volumes:
  clickhouse-data:
