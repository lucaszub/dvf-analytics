server {
    listen 80;

    # Fichiers statiques React
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;  # SPA routing
    }

    # Proxy vers l'API — remplace le proxy Vite du dev
    # En K8s : "api" est résolu via DNS interne K8s (service api dans le namespace dvf)
    # En local docker-compose : "api" est le nom du service
    location /communes       { proxy_pass http://api:8000; }
    location /departements   { proxy_pass http://api:8000; }
    location /bretagne       { proxy_pass http://api:8000; }
    location /sections       { proxy_pass http://api:8000; }
    location /parcelles      { proxy_pass http://api:8000; }
    location /mutations      { proxy_pass http://api:8000; }
    location /code-postaux   { proxy_pass http://api:8000; }
    location /health         { proxy_pass http://api:8000; }
}
